name: Deploy to DigitalOcean Droplet (Docker)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-user/ai-gentic-flow

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx (layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into Droplet & redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script: |
            set -e

            IMAGE="ghcr.io/${{ github.repository }}:latest"

            # Authenticate with GHCR using a PAT stored on the droplet
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull the freshly built image
            docker pull $IMAGE

            # Zero-downtime swap: start new → stop old
            docker stop ai-gentic-flow 2>/dev/null || true
            docker rm   ai-gentic-flow 2>/dev/null || true

            docker run -d \
              --name ai-gentic-flow \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /var/www/ai-gentic-flow/.env \
              $IMAGE

            # Remove dangling images to save disk space
            docker image prune -f
